<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6c63ff,#00c6ff);
}

.logout-box{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logout-box h2{
    margin-bottom:15px;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 25px;
    text-decoration:none;
    border-radius:8px;
    color:white;
    background:#6c63ff;
}

.btn:hover{
    opacity:0.9;
}
</style>
</head>
<body>

<div class="logout-box">

    <h2>✅ Logged Out Successfully</h2>
    <p>Thank you for visiting my portfolio.</p>

    <a href="login.html" class="btn">Login Again</a>
    <br><br>
    <a href="index.html" class="btn">🏠 Go to Portfolio</a>

</div>

</body>
</html>
