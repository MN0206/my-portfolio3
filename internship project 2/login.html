<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
}

/* Container */
.login-container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Center main */
#main-content{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.login-card{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(25px);
    border-radius:20px;
    padding:40px;
    border:1px solid rgba(255,255,255,.2);
}

/* Title */
.login-card h2{
    text-align:center;
    color:white;
    margin-bottom:10px;
    font-size:2rem;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

/* Inputs */
label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-bottom:20px;
    background:rgba(255,255,255,.15);
    color:white;
    outline:none;
}

input:focus{
    border:2px solid #38bdf8;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    color:white;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(56,189,248,.5);
}

/* Link */
.extra-links{
    text-align:center;
    margin-top:20px;
}

.extra-links a{
    color:#38bdf8;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-container">

    <main id="main-content">

        <section class="login-card">

            <h2>Welcome Back</h2>
            <p class="subtitle">Login to continue</p>

            <form action="index.html">

                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>

            </form>

            <div class="extra-links">
                <p><a href="index.html"></a></p>
            </div>

        </section>

    </main>

</div>

</body>
</html>
